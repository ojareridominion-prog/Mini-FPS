<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <style>
        body { margin: 0; overflow: hidden; background: #1a1a1a; font-family: sans-serif; }
        #container { position: absolute; top: 0; left: 0; display: block; }
        @media screen and (orientation: portrait) {
            #container { width: 100vh; height: 100vw; transform: rotate(90deg); transform-origin: top left; left: 100vw; }
        }
        @media screen and (orientation: landscape) { #container { width: 100vw; height: 100vh; } }
        
        .ui-overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 10; }
        .menu { position: absolute; left: 40px; top: 50%; transform: translateY(-50%); display: flex; flex-direction: column; gap: 20px; pointer-events: auto; }
        .btn { padding: 15px 40px; background: #edc531; border: none; font-weight: bold; cursor: pointer; border-radius: 5px; }
    </style>
</head>
<body>
    <div id="container">
        <div class="ui-overlay">
            <div class="menu">
                <button class="btn" onclick="location.href='match.html'">BATTLE</button>
                <button class="btn">LOADOUT</button>
                <button class="btn">SETTINGS</button>
            </div>
        </div>
        <div id="canvas-target"></div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="Testplayer.js"></script>
    <script>
        const scene = new THREE.Scene();
        const w = Math.max(window.innerWidth, window.innerHeight);
        const h = Math.min(window.innerWidth, window.innerHeight);
        const camera = new THREE.PerspectiveCamera(75, w / h, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(w, h);
        document.getElementById('canvas-target').appendChild(renderer.domElement);

        scene.add(new THREE.AmbientLight(0xffffff, 0.6));
        const player = createTestPlayer();
        scene.add(player);
        camera.position.set(0, 1.5, 4);

        let isDragging = false, lastX = 0;
        document.addEventListener('touchstart', (e) => { isDragging = true; lastX = e.touches[0].clientX; });
        document.addEventListener('touchend', () => isDragging = false);
        document.addEventListener('touchmove', (e) => {
            if (!isDragging) return;
            let dx = e.touches[0].clientX - lastX;
            if (window.innerHeight > window.innerWidth) { dx = e.touches[0].clientY - lastX; }
            player.rotation.y += dx * 0.01;
            lastX = (window.innerHeight > window.innerWidth) ? e.touches[0].clientY : e.touches[0].clientX;
        });

        function animate() { requestAnimationFrame(animate); renderer.render(scene, camera); }
        animate();
    </script>
</body>
</html>
