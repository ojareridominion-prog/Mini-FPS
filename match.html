<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <style>
        body { margin: 0; overflow: hidden; background: #000; }
        #container { position: absolute; top: 0; left: 0; }
        @media screen and (orientation: portrait) {
            #container { width: 100vh; height: 100vw; transform: rotate(90deg); transform-origin: top left; left: 100vw; }
        }
        @media screen and (orientation: landscape) { #container { width: 100vw; height: 100vh; } }
        .btn { position: absolute; padding: 20px 40px; background: #edc531; border: none; font-weight: bold; z-index: 20; }
        .back { top: 20px; left: 20px; }
        .start { bottom: 40px; right: 40px; font-size: 1.5rem; }
    </style>
</head>
<body>
    <div id="container">
        <button class="btn back" onclick="location.href='homepage.html'">BACK</button>
        <button class="btn start" onclick="location.href='game.html'">START GAME</button>
        <div id="canvas-target"></div>
    </div>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="Testplayer.js"></script>
    <script src="Testpry.js"></script>
    <script>
        const scene = new THREE.Scene();
        const w = Math.max(window.innerWidth, window.innerHeight), h = Math.min(window.innerWidth, window.innerHeight);
        const camera = new THREE.PerspectiveCamera(75, w / h, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(w, h);
        document.getElementById('canvas-target').appendChild(renderer.domElement);

        scene.add(new THREE.AmbientLight(0xffffff, 0.8));
        const player = createTestPlayer();
        const rifle = createTestPry();
        rifle.position.set(0.4, 1.5, 0.4); // Slung over shoulder
        player.add(rifle);
        scene.add(player);
        camera.position.set(0, 1.5, 3);

        let isDragging = false, lastX = 0;
        document.addEventListener('touchstart', e => { isDragging = true; lastX = (window.innerHeight > window.innerWidth) ? e.touches[0].clientY : e.touches[0].clientX; });
        document.addEventListener('touchend', () => isDragging = false);
        document.addEventListener('touchmove', e => {
            if (!isDragging) return;
            const currentX = (window.innerHeight > window.innerWidth) ? e.touches[0].clientY : e.touches[0].clientX;
            player.rotation.y += (currentX - lastX) * 0.01;
            lastX = currentX;
        });

        function animate() { requestAnimationFrame(animate); renderer.render(scene, camera); }
        animate();
    </script>
</body>
</html>
