<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <style>
        body { margin: 0; overflow: hidden; background: #000; font-family: sans-serif; }
        #container { position: absolute; top: 0; left: 0; }
        
        @media screen and (orientation: portrait) {
            #container { width: 100vh; height: 100vw; transform: rotate(90deg); transform-origin: top left; left: 100vw; }
        }
        @media screen and (orientation: landscape) { #container { width: 100vw; height: 100vh; } }

        #joystick-zone { 
            position: absolute; bottom: 10%; left: 5%; 
            width: 120px; height: 120px; 
            background: rgba(255,255,255,0.1); border: 2px solid rgba(255,255,255,0.2);
            border-radius: 50%; z-index: 20; pointer-events: none; 
        }
        #stick { 
            position: absolute; top: 50%; left: 50%; 
            width: 50px; height: 50px; background: #edc531; 
            border-radius: 50%; transform: translate(-50%, -50%); 
        }
        #swap-btn { 
            position: absolute; bottom: 10%; right: 5%; 
            padding: 20px 30px; background: #edc531; border: none; 
            border-radius: 12px; font-weight: bold; z-index: 30; 
        }
    </style>
</head>
<body>
    <div id="container">
        <div id="joystick-zone"><div id="stick"></div></div>
        <button id="swap-btn">SWAP WEAPON</button>
        <div id="render-target"></div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="Testenv.js"></script>
    <script src="Testpry.js"></script>
    <script src="Testsec.js"></script>

    <script>
        const scene = new THREE.Scene();
        const vW = Math.max(window.innerWidth, window.innerHeight);
        const vH = Math.min(window.innerWidth, window.innerHeight);
        
        const camera = new THREE.PerspectiveCamera(75, vW / vH, 0.1, 1000);
        camera.rotation.order = 'YXZ'; // 👈 Prevents roll when looking up/down
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(vW, vH);
        document.getElementById('render-target').appendChild(renderer.domElement);

        scene.add(new THREE.AmbientLight(0xffffff, 0.5));
        scene.add(createTestEnv());

        // Weapon Setup
        const rifle = createTestPry();
        const pistol = createTestSec();
        rifle.position.set(0.3, -0.3, -0.6);
        pistol.position.set(0.3, -0.3, -0.5);
        camera.add(rifle);
        scene.add(camera);
        camera.position.set(0, 1.7, 5);

        let isRifle = true;
        document.getElementById('swap-btn').addEventListener('touchstart', (e) => {
            e.stopPropagation();
            if(isRifle) { camera.remove(rifle); camera.add(pistol); }
            else { camera.remove(pistol); camera.add(rifle); }
            isRifle = !isRifle;
        });

        // --- SMOOTH INPUT ENGINE ---
        let moveTouchId = null, lookTouchId = null;
        let lastLookX = 0, lastLookY = 0;

        // Target values (raw from input)
        let targetRotY = camera.rotation.y;
        let targetRotX = camera.rotation.x;
        let targetMoveF = 0;
        let targetMoveS = 0;

        // Smoothed values (used each frame)
        let smoothRotY = camera.rotation.y;
        let smoothRotX = camera.rotation.x;
        let smoothMoveF = 0;
        let smoothMoveS = 0;

        // Smoothing factors (0.1 = gentle, 0.2 = more responsive)
        const ROTATION_LERP = 0.15;
        const MOVEMENT_LERP = 0.15;

        const stick = document.getElementById('stick');

        window.addEventListener('touchstart', (e) => {
            for (let i = 0; i < e.changedTouches.length; i++) {
                const t = e.changedTouches[i];
                const isPortrait = window.innerHeight > window.innerWidth;
                const visualX = isPortrait ? t.clientY : t.clientX;

                // Left 40% of screen = Movement
                if (visualX < vW * 0.4 && moveTouchId === null) {
                    moveTouchId = t.identifier;
                } 
                // Right 60% of screen = Looking
                else if (visualX >= vW * 0.4 && lookTouchId === null) {
                    lookTouchId = t.identifier;
                    lastLookX = isPortrait ? t.clientY : t.clientX;
                    lastLookY = isPortrait ? (window.innerWidth - t.clientX) : t.clientY;
                }
            }
        }, { passive: false });

        window.addEventListener('touchmove', (e) => {
            const isPortrait = window.innerHeight > window.innerWidth;
            
            for (let i = 0; i < e.touches.length; i++) {
                const t = e.touches[i];

                // --- Movement joystick ---
                if (t.identifier === moveTouchId) {
                    const rect = document.getElementById('joystick-zone').getBoundingClientRect();
                    const jCenterX = isPortrait ? rect.top + rect.height/2 : rect.left + rect.width/2;
                    const jCenterY = isPortrait ? (window.innerWidth - rect.left - rect.width/2) : rect.top + rect.height/2;
                    
                    const curX = isPortrait ? t.clientY : t.clientX;
                    const curY = isPortrait ? (window.innerWidth - t.clientX) : t.clientY;

                    let dx = curX - jCenterX;
                    let dy = curY - jCenterY;
                    const dist = Math.min(Math.sqrt(dx*dx + dy*dy), 60);
                    const angle = Math.atan2(dy, dx);

                    // Update visual stick
                    stick.style.transform = `translate(calc(-50% + ${Math.cos(angle)*dist}px), calc(-50% + ${Math.sin(angle)*dist}px))`;

                    // Set target movement (in camera‑relative space)
                    targetMoveF = -Math.sin(angle) * (dist / 60) * 0.15;
                    targetMoveS =  Math.cos(angle) * (dist / 60) * 0.15;
                }

                // --- Look (right side) ---
                if (t.identifier === lookTouchId) {
                    const curX = isPortrait ? t.clientY : t.clientX;
                    const curY = isPortrait ? (window.innerWidth - t.clientX) : t.clientY;
                    
                    const deltaX = curX - lastLookX;
                    const deltaY = curY - lastLookY;

                    // Update target rotation (clamped to prevent flipping)
                    targetRotY -= deltaX * 0.008;  // slightly increased sensitivity
                    targetRotX  = Math.max(-Math.PI/3, Math.min(Math.PI/3, targetRotX - deltaY * 0.008));
                    
                    lastLookX = curX;
                    lastLookY = curY;
                }
            }
        }, { passive: false });

        window.addEventListener('touchend', (e) => {
            for (let i = 0; i < e.changedTouches.length; i++) {
                const t = e.changedTouches[i];
                if (t.identifier === moveTouchId) {
                    moveTouchId = null;
                    targetMoveF = 0;
                    targetMoveS = 0;
                    stick.style.transform = `translate(-50%, -50%)`;
                }
                if (t.identifier === lookTouchId) {
                    lookTouchId = null;
                }
            }
        });

        function animate() {
            requestAnimationFrame(animate);

            // Smoothly interpolate rotation
            smoothRotY += (targetRotY - smoothRotY) * ROTATION_LERP;
            smoothRotX += (targetRotX - smoothRotX) * ROTATION_LERP;
            camera.rotation.y = smoothRotY;
            camera.rotation.x = smoothRotX;

            // Smoothly interpolate movement
            smoothMoveF += (targetMoveF - smoothMoveF) * MOVEMENT_LERP;
            smoothMoveS += (targetMoveS - smoothMoveS) * MOVEMENT_LERP;

            // Apply movement (forward/back and left/right relative to camera view)
            camera.translateZ(-smoothMoveF);
            camera.translateX(smoothMoveS);

            // Keep camera at constant height (no flying/climbing)
            camera.position.y = 1.7;

            renderer.render(scene, camera);
        }
        animate();
    </script>
</body>
</html>
