<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <style>
        body { margin: 0; overflow: hidden; background: #000; font-family: sans-serif; }
        
        /* Force Landscape for Mobile */
        @media screen and (orientation: portrait) {
            #game-container {
                transform: rotate(90deg);
                transform-origin: bottom left;
                position: absolute;
                top: -100vw;
                left: 0;
                height: 100vw;
                width: 100vh;
            }
        }

        #game-container { width: 100vw; height: 100vh; position: relative; }

        /* Joystick UI */
        #joystick-zone { 
            position: absolute; bottom: 40px; left: 40px; 
            width: 120px; height: 120px; background: rgba(255,255,255,0.1); 
            border: 2px solid rgba(255,255,255,0.3); border-radius: 50%; z-index: 20; 
        }
        #joystick-stick {
            position: absolute; top: 50%; left: 50%;
            width: 50px; height: 50px; background: #edc531;
            border-radius: 50%; transform: translate(-50%, -50%);
        }

        #switch-btn { 
            position: absolute; bottom: 40px; right: 40px; 
            padding: 20px; background: #edc531; color: black;
            border: none; border-radius: 10px; z-index: 20; font-weight: bold;
        }
    </style>
</head>
<body>
    <div id="game-container">
        <div id="joystick-zone"><div id="joystick-stick"></div></div>
        <button id="switch-btn">SWAP WEAPON</button>
        <div id="renderer-target"></div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="Testenv.js"></script>
    <script src="Testpry.js"></script>
    <script src="Testsec.js"></script>

    <script>
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x111111); // Ensure it's not pure black

        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.getElementById('renderer-target').appendChild(renderer.domElement);

        // STAGE 1: LIGHTING (Added more so you can actually see)
        const ambient = new THREE.AmbientLight(0xffffff, 0.4);
        scene.add(ambient);
        const sun = new THREE.DirectionalLight(0xffffff, 0.8);
        sun.position.set(5, 10, 7);
        scene.add(sun);

        // STAGE 2: ENVIRONMENT
        const env = createTestEnv();
        scene.add(env);

        camera.position.set(0, 1.7, 5); // Start slightly away from the center

        // STAGE 3: WEAPONS
        const rifle = createTestPry();
        const pistol = createTestSec();
        rifle.position.set(0.3, -0.3, -0.6); 
        camera.add(rifle); 
        scene.add(camera);

        // STAGE 4: JOYSTICK LOGIC
        let moveForward = 0;
        let moveSide = 0;
        const joystickStick = document.getElementById('joystick-stick');
        const joystickZone = document.getElementById('joystick-zone');

        joystickZone.addEventListener('touchmove', (e) => {
            const touch = e.touches[0];
            const rect = joystickZone.getBoundingClientRect();
            const centerX = rect.left + rect.width / 2;
            const centerY = rect.top + rect.height / 2;
            
            let deltaX = touch.clientX - centerX;
            let deltaY = touch.clientY - centerY;
            
            const dist = Math.sqrt(deltaX*deltaX + deltaY*deltaY);
            const maxDist = 60;
            if(dist > maxDist) {
                deltaX *= maxDist / dist;
                deltaY *= maxDist / dist;
            }

            joystickStick.style.transform = `translate(calc(-50% + ${deltaX}px), calc(-50% + ${deltaY}px))`;
            
            // Movement speed factors
            moveForward = -deltaY / maxDist * 0.1;
            moveSide = deltaX / maxDist * 0.1;
        });

        joystickZone.addEventListener('touchend', () => {
            joystickStick.style.transform = `translate(-50%, -50%)`;
            moveForward = 0;
            moveSide = 0;
        });

        function animate() {
            requestAnimationFrame(animate);
            camera.translateZ(-moveForward);
            camera.translateX(moveSide);
            renderer.render(scene, camera);
        }
        animate();
    </script>
</body>
</html>
