<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <style>
        body { margin: 0; overflow: hidden; background: #000; font-family: sans-serif; }
        #container { position: absolute; top: 0; left: 0; }
        @media screen and (orientation: portrait) {
            #container { width: 100vh; height: 100vw; transform: rotate(90deg); transform-origin: top left; left: 100vw; }
        }
        @media screen and (orientation: landscape) { #container { width: 100vw; height: 100vh; } }

        #joystick-zone { 
            position: absolute; bottom: 10%; left: 5%; 
            width: 120px; height: 120px; 
            background: rgba(255,255,255,0.1); border: 2px solid rgba(255,255,255,0.2);
            border-radius: 50%; z-index: 20; pointer-events: none; 
        }
        #stick { 
            position: absolute; top: 50%; left: 50%; 
            width: 50px; height: 50px; background: #edc531; 
            border-radius: 50%; transform: translate(-50%, -50%); 
        }
        #swap-btn { position: absolute; bottom: 10%; right: 5%; padding: 20px; background: #edc531; border: none; font-weight: bold; z-index: 25; border-radius: 10px; }
    </style>
</head>
<body>
    <div id="container">
        <div id="joystick-zone"><div id="stick"></div></div>
        <button id="swap-btn">SWAP</button>
        <div id="renderer-target"></div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="Testenv.js"></script>
    <script src="Testpry.js"></script>
    <script src="Testsec.js"></script>

    <script>
        const scene = new THREE.Scene();
        const w = Math.max(window.innerWidth, window.innerHeight), h = Math.min(window.innerWidth, window.innerHeight);
        const camera = new THREE.PerspectiveCamera(75, w / h, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(w, h);
        document.getElementById('renderer-target').appendChild(renderer.domElement);

        scene.add(new THREE.AmbientLight(0xffffff, 0.5));
        scene.add(createTestEnv());

        const rifle = createTestPry();
        const pistol = createTestSec();
        rifle.position.set(0.3, -0.3, -0.6);
        camera.add(rifle);
        scene.add(camera);

        let moveF = 0, moveS = 0, moveTouchId = null, lookTouchId = null, lastLookX = 0, lastLookY = 0;
        const stick = document.getElementById('stick');

        document.addEventListener('touchstart', (e) => {
            const t = e.changedTouches[0];
            const isPortrait = window.innerHeight > window.innerWidth;
            const clientX = isPortrait ? t.clientY : t.clientX;
            const wHalf = isPortrait ? window.innerHeight / 2 : window.innerWidth / 2;

            if (clientX < wHalf && moveTouchId === null) {
                moveTouchId = t.identifier;
            } else if (clientX >= wHalf && lookTouchId === null) {
                lookTouchId = t.identifier;
                lastLookX = clientX;
                lastLookY = isPortrait ? (window.innerWidth - t.clientX) : t.clientY;
            }
        });

        document.addEventListener('touchmove', (e) => {
            e.preventDefault();
            const isPortrait = window.innerHeight > window.innerWidth;
            for (let i = 0; i < e.changedTouches.length; i++) {
                const t = e.changedTouches[i];
                if (t.identifier === moveTouchId) {
                    const rect = document.getElementById('joystick-zone').getBoundingClientRect();
                    const jX = isPortrait ? rect.top + 60 : rect.left + 60;
                    const jY = isPortrait ? (window.innerWidth - rect.left - 60) : rect.top + 60;
                    const curX = isPortrait ? t.clientY : t.clientX;
                    const curY = isPortrait ? (window.innerWidth - t.clientX) : t.clientY;
                    
                    const dx = curX - jX, dy = curY - jY;
                    const dist = Math.min(Math.sqrt(dx*dx + dy*dy), 60);
                    const angle = Math.atan2(dy, dx);
                    
                    stick.style.transform = `translate(calc(-50% + ${Math.cos(angle)*dist}px), calc(-50% + ${Math.sin(angle)*dist}px))`;
                    moveF = -Math.sin(angle) * (dist / 60) * 0.15;
                    moveS = Math.cos(angle) * (dist / 60) * 0.15;
                }
                if (t.identifier === lookTouchId) {
                    const curX = isPortrait ? t.clientY : t.clientX;
                    const curY = isPortrait ? (window.innerWidth - t.clientX) : t.clientY;
                    camera.rotation.y -= (curX - lastLookX) * 0.005;
                    camera.rotation.x = Math.max(-1, Math.min(1, camera.rotation.x - (curY - lastLookY) * 0.005));
                    lastLookX = curX; lastLookY = curY;
                }
            }
        }, { passive: false });

        window.addEventListener('touchend', (e) => {
            for (let t of e.changedTouches) {
                if (t.identifier === moveTouchId) { moveTouchId = null; moveF = 0; moveS = 0; stick.style.transform = `translate(-50%, -50%)`; }
                if (t.identifier === lookTouchId) lookTouchId = null;
            }
        });

        function animate() {
            requestAnimationFrame(animate);
            camera.translateZ(-moveF); camera.translateX(moveS);
            camera.position.y = 1.7; 
            renderer.render(scene, camera);
        }
        animate();
    </script>
</body>
</html>
